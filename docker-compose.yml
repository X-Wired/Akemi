# Akemi v2.0.0 Docker Compose deployment
# Quick start:
#   AKEMI_MCP_SERVER_API_KEY=change-me docker compose --profile server up -d
#
# Profiles:
#   docker compose --profile cli run akemi-cli scan --host example.com
#   AKEMI_MCP_SERVER_API_KEY=change-me docker compose --profile server up -d akemi-server
#   docker compose --profile tui run akemi-tui

services:
  akemi-server:
    build: .
    image: akemi:2.0.0
    container_name: akemi-server
    command:
      - serve
      - --transport
      - http
      - --host
      - "0.0.0.0"
      - --port
      - "9090"
      - --mcp-path
      - /mcp
      - --api-key
      - "${AKEMI_MCP_SERVER_API_KEY:-}"
      - --probe-dir
      - /etc/akemi/probes
    ports:
      - "9090:9090"
    volumes:
      - akemi-data:/var/lib/akemi
      - ./probes:/etc/akemi/probes:ro
      - ./config:/etc/akemi/config:ro
    environment:
      AKEMI_DB_DSN: /var/lib/akemi/akemi.db
      AKEMI_MCP_SERVER_API_KEY: "${AKEMI_MCP_SERVER_API_KEY:-}"
      AKEMI_MCP_SERVER_TRANSPORT: http
      AKEMI_MCP_SERVER_HOST: 0.0.0.0
      AKEMI_MCP_SERVER_PORT: "9090"
      AKEMI_MCP_SERVER_PATH: /mcp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    profiles:
      - server
      - full

  akemi-cli:
    build: .
    image: akemi:2.0.0
    container_name: akemi-cli
    stdin_open: true
    tty: true
    volumes:
      - akemi-data:/var/lib/akemi
      - ./probes:/etc/akemi/probes:ro
      - ./results:/results
    environment:
      AKEMI_DB_DSN: /var/lib/akemi/akemi.db
    profiles:
      - cli

  akemi-tui:
    build: .
    image: akemi:2.0.0
    container_name: akemi-tui
    stdin_open: true
    tty: true
    command:
      - interactive
      - --probe-dir
      - /etc/akemi/probes
    volumes:
      - akemi-data:/var/lib/akemi
      - ./probes:/etc/akemi/probes:ro
    environment:
      TERM: xterm-256color
    profiles:
      - tui

volumes:
  akemi-data:
    driver: local
