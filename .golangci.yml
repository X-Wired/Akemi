# Akemi — golangci-lint configuration
# See: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: "1.24"

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional linters
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - whitespace
    - bodyclose
    - nilerr
    - noctx
    - prealloc
    - makezero

  disable:
    - depguard     # Allow all dependencies during Phase 1 refactor
    - exhaustive   # Too noisy for existing code
    - gochecknoglobals # We have intentional globals for config/session state

linters-settings:
  govet:
    check-shadowing: true
    enable-all: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: Akemi

  misspell:
    locale: US
    ignore-words:
      - "akemi"     # Project name

  staticcheck:
    checks: ["all", "-SA1019"] # Allow deprecated usage during migration

issues:
  exclude-rules:
    # Exclude some linters from test files
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
        - noctx

    # Exclude known false positives from legacy code
    - path: internal/
      text: "SA1019:"  # Allow deprecated during migration
      linters:
        - staticcheck

  max-issues-per-linter: 50
  max-same-issues: 10

  # Show all issues, not just new ones
  new: false
